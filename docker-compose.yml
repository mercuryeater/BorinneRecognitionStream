services:
  borinne:
    build: .
    image: borinne-recognition-stream
    restart: unless-stopped

    # Expose the web stream on the host
    ports:
      - "5000:5000"

    # Load credentials from .env (never bake secrets into the image)
    env_file:
      - .env

    # Persist cat snapshots on the host machine even after container restarts.
    # Photos appear in ./src/cat_shots/ next to your docker-compose.yml.
    volumes:
      - ./src/cat_shots:/app/src/cat_shots

    # NOTE: network_mode: host is NOT used here because:
    #   - On Mac/Windows Docker Desktop it doesn't share the host LAN anyway
    #   - It conflicts with the ports directive above
    # The default bridge network works fine: Docker Desktop routes LAN traffic
    # so the container can reach the camera at 192.168.0.x without any changes.
    #
    # On Linux hosts only: if the camera is unreachable, uncomment the line
    # below AND remove the ports section above (they can't coexist).
    # network_mode: host

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
